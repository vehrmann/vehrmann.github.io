<html>
    <head>
    </head>
    <body style="display: grid;">
        <!-- add later to model-viewer
            ios-src =               "model.usdz"
            poster =                "pic.webp"
            ar-status =             "not-presenting" ??
            camera-orbit
            
            xr-environment
            disable-pan
        -->
        <model-viewer
            alt =               ""
            src =               "./assets/wall-ti12.glb"
            loading =           "eager"
            shadow-intensity=   "1"

            camera-target =     "0m 1.1m 0m"

            camera-controls 
            camera-orbit =      "65deg 80deg auto" 
            min-camera-orbit =  "1deg auto auto" 
            max-camera-orbit =  "179deg auto auto"

            max-field-of-view = "45deg"
            touch-action =      "pan-y"
            

            ar
            ar-scale =          "fixed"
            ar-placement =      "floor"
        >
            <div class="progress-bar hide" slot="progress-bar">
                <div class="update-bar"></div>
            </div>
            <button slot="ar-button" id="ar-button">View in your space</button>
            <!-- <div id="ar-prompt"><img src="https://modelviewer.dev/shared-assets/icons/hand.png"></div> -->

            <button id="ar-failure">AR not tracking - please close and open AR window</button>

            <!-- <button id="myButton1">Scale0</button>
            <button id="myButton2">Scale1</button>

            <span id="cons">XYZ</span> -->

            <div class="model-controls">
                <div class="animation-controls">
                    <div class="animation-container">
                        <input id="slider-animation-all-updown"         type="range" min="0" max="80" step="1" value="50">
                        <div class="icon-arrow"><img src="./assets/icons/arrow_floorheight.png"></div>
                    </div>
                    <div class="animation-container">
                        <input id="slider-animation-korpus-updown"      type="range" min="0" max="55" step="1" value="20">
                        <div class="icon-arrow"><img src="./assets/icons/arrow_updown.png" id="icon-arrow-updown"></div>
                    </div>
                    <div class="animation-container">
                        <input id="slider-animation-klappe-openclose"   type="range" min="0" max="49" step="1" value="0">
                        <div class="icon-arrow"><img src="./assets/icons/arrow_openclose.png"></div>
                    </div>
                </div>
                <div class="toggle-animation-controls">
                    <div id="toggle-animation-controls-open"></div>
                    <div id="toggle-animation-controls-close" class="toggle-animation-controls-invisible"></div>
                </div>
            </div>

            <div class="model-controls">
                <div class="toggle-variant-controls">
                    <div id="toggle-variant-controls-open"></div>
                    <div id="toggle-variant-controls-close" class="toggle-variant-controls-invisible"></div>
                </div>

                <div class="variant-controls">
                    <div class="variant-container">
                        <label for="select-width-korpus">Korpusbreite</label>
                        <select id="select-width-korpus">
                            <option value="80">80 cm</option>
                            <option value="100" selected>100 cm</option>
                            <option value="120">120 cm</option>
                        </select>
                    </div>
                    
                    <div class="variant-container">
                        <label for="checkbox-hoehenverstellbarkeit">Höhenverstellbarkeit</label>
                        <input id="checkbox-hoehenverstellbarkeit" type="checkbox" checked>
                    </div>

                    <div class="variant-container">
                        <label for="checkbox-bluetooth">Bluetooth-Steuerung</label>
                        <input id="checkbox-bluetooth" type="checkbox">
                    </div>

                    <div class="variant-container">
                        <label for="select-color-fuesse">Hubsäulen</label>
                        <select id="select-color-fuesse">
                            <option value="fuesse_schwarz">schwarz</option>
                            <option value="fuesse_weiss">weiß</option>
                        </select>
                    </div>

                    <div class="variant-container">
                        <label for="select-color-korpus">Korpusfarbe</label>
                        <select id="select-color-korpus">
                            <option value="korpus_weiss">weiß</option>
                            <option value="korpus_schwarz">schwarz</option>
                        </select>
                    </div>

                    <div class="variant-container select-color-griff">
                        <div class="select-color-griff-current-selection">
                            <label for="select-color-griff">Griff</label>
                            <div title="Leder braun" bg-src="https://cdn.webshopapp.com/shops/88450/themes/178435/assets/lc-cognac.jpg"></div>
                        </div>
                        <div class="select-color-griff-options" style="display: none;">
                            <div data-value="griff_leder_braun"             title="Leder braun"                  bg-src="https://cdn.webshopapp.com/shops/88450/themes/178435/assets/lc-cognac.jpg">
                                <img id="current-selection-griff-circular-border" src="./assets/icons/circular-border.png">
                            </div>
                            <div data-value="griff_leder_schwarz"           title="Leder schwarz"                bg-src="https://cdn.webshopapp.com/shops/88450/themes/178435/assets/LC-schwarz.jpg"></div>
                            <div data-value="griff_bicolor_grau"            title="Filz bicolor grau"            bg-src="https://cdn.webshopapp.com/shops/88450/themes/178435/assets/fm-filz-bicolor-grau.jpg"></div>
                            <div data-value="griff_bicolor_braun"           title="Filz bicolor braun beige"     bg-src="https://cdn.webshopapp.com/shops/88450/themes/178435/assets/fm-filz-bicolor-braun-beige.jpg"></div>
                            <div data-value="griff_meliert_anthrazit"       title="Filz meliert anthrazit"       bg-src="https://cdn.webshopapp.com/shops/88450/themes/178435/assets/fm-filz-anthrazit-meliert.jpg"></div>
                            <div data-value="griff_meliert_dunkelgrau"      title="Filz meliert dunkelgrau"      bg-src="https://cdn.webshopapp.com/shops/88450/themes/178435/assets/fm-filz-dunkel-grau-meliert.jpg"></div>
                            <div data-value="griff_meliert_hellgrau"        title="Filz meliert hellgrau"        bg-src="https://cdn.webshopapp.com/shops/88450/themes/178435/assets/fm-filz-hell-grau-meliert.jpg"></div>
                            <div data-value="griff_meliert_natur"           title="Filz meliert natur"           bg-src="https://cdn.webshopapp.com/shops/88450/themes/178435/assets/fm-filz-natur-meliert.jpg"></div>
                            <div data-value="griff_meliert_gelb"            title="Filz meliert gelb"            bg-src="https://cdn.webshopapp.com/shops/88450/themes/178435/assets/fm-filz-mustard-meliert.jpg"></div>
                            <div data-value="griff_meliert_orange"          title="Filz meliert orange"          bg-src="https://cdn.webshopapp.com/shops/88450/themes/178435/assets/fm-filz-gebranntes-orange-meliert.jpg"></div>
                            <div data-value="griff_meliert_dunkelrot"       title="Filz meliert dunkelrot"       bg-src="https://cdn.webshopapp.com/shops/88450/themes/178435/assets/fm-filz-dunkel-rot-meliert.jpg"></div>
                            <div data-value="griff_meliert_denim"           title="Filz meliert denim"           bg-src="https://cdn.webshopapp.com/shops/88450/themes/178435/assets/fm-filz-denim-meliert.jpg"></div>
                            <div data-value="griff_meliert_petrol"          title="Filz meliert petrol"          bg-src="https://cdn.webshopapp.com/shops/88450/themes/178435/assets/fm-filz-petrol-meliert.jpg"></div>
                            <div data-value="griff_meliert_waldgruen"       title="Filz meliert waldgrün"        bg-src="https://cdn.webshopapp.com/shops/88450/themes/178435/assets/fm-filz-wald-gruen-meliert.jpg"></div>
                            <div data-value="griff_meliert_grasgruen"       title="Filz meliert grasgrün"        bg-src="https://cdn.webshopapp.com/shops/88450/themes/178435/assets/fm-filz-gras-gruen-meliert.jpg"></div>
                            <div data-value="griff_uni_gelb"                title="Filz uni gelb"                bg-src="https://cdn.webshopapp.com/shops/88450/themes/178435/assets/fm-filz-gelb-uni.jpg"></div>
                            <div data-value="griff_uni_orange"              title="Filz uni orange"              bg-src="https://cdn.webshopapp.com/shops/88450/themes/178435/assets/fm-filz-orange-uni.jpg"></div>
                            <div data-value="griff_uni_dunkelrot"           title="Filz uni dunkelrot"           bg-src="https://cdn.webshopapp.com/shops/88450/themes/178435/assets/fm-filz-dunkel-rot-uni.jpg"></div>
                            <div data-value="griff_uni_pink"                title="Filz uni pink"                bg-src="https://cdn.webshopapp.com/shops/88450/themes/178435/assets/fm-filz-pink-uni.jpg"></div>
                            <div data-value="griff_uni_dunkelblau"          title="Filz uni dunkelblau"          bg-src="https://cdn.webshopapp.com/shops/88450/themes/178435/assets/fm-filz-dunkel-blau-uni.jpg"></div>
                            <div data-value="griff_uni_lemon"               title="Filz uni lemon"               bg-src="https://cdn.webshopapp.com/shops/88450/themes/178435/assets/fm-filz-lemon-uni.jpg"></div>
                            <div data-value="griff_uni_schokoladenbraun"    title="Filz uni schokoladenbraun"    bg-src="https://cdn.webshopapp.com/shops/88450/themes/178435/assets/fm-filz-braun-chocolate-uni.jpg"></div>
                        </div>
                    </div>

                    <div class="variant-container">
                        <label for="select-color-laptophalter_l">Laptophalter links</label>
                        <select id="select-color-laptophalter_l">
                            <option value="keinen">keinen</option>
                            <option value="laptophalter_l_weiss">weiß</option>
                            <option value="laptophalter_l_schwarz">schwarz</option>
                        </select>
                    </div>

                    <div class="variant-container">
                        <label for="select-color-laptophalter_r">Laptophalter rechts</label>
                        <select id="select-color-laptophalter_r">
                            <option value="keinen">keinen</option>
                            <option value="laptophalter_r_weiss">weiß</option>
                            <option value="laptophalter_r_schwarz">schwarz</option>
                        </select>
                    </div>

                    <div class="variant-container">
                        <label for="checkbox-bilderrahmen">Bilderrahmenfunktion</label>
                        <input id="checkbox-bilderrahmen" type="checkbox" checked>
                    </div>

                    <!-- <div class="variant-container">
                        <input id="input-bilderrahmen-upload" type="file" accept="image/*" style="display: none;" />
                        <button id="button-bilderrahmen-upload">Eigenes Bild hochladen</button>
                        <button id="button-crop-image">Crop</button>
                    </div> -->

                    <div class="variant-container">
                        <label for="select-visibility-zubehoer">Zubehör einblenden</label>
                        <input id="select-visibility-zubehoer" type="checkbox">
                    </div>
                    <div class="variant-container">
                        <label for="select-visibility-raum">Raum einblenden</label>
                        <input id="select-visibility-raum" type="checkbox" checked>
                    </div>
                </div>

            </div>
            <!-- <div class="input-container">
                <img id="input-image">
            </div> -->
            <img src="./assets/linak_smartphone.png" id="bluetooth-image-overlay">
        </model-viewer>


        <!--    es-module-shims.js (+ three.module.min.js) and model-viewer-module.min.js (does not contain three in contrast to model-viewer.min.js) 
                enables post-processing (see https://modelviewer.dev/examples/postprocessing/)
        -->

        <script type="importmap">

            }
        </script>
        <script type='module' src='./node_modules/@google/model-viewer/dist/model-viewer-module.min.js'></script>

        <script type='module' src='./node_modules/@google/model-viewer/dist/model-viewer.min.js'></script>
        <script type="module" src="./js/modelviewer_custom.js"></script>

        <link rel="stylesheet" type="text/css" href="./css/modelviewer_custom.css">
    </body>
</html>
